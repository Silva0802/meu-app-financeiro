<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financeiro</title>

<style>
body { font-family: Arial; background:#111; color:#fff; margin:0; }
header { text-align:center; padding:15px; background:#222; }

.container { padding:12px; }

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.card {
  background:#1e1e1e;
  padding:15px;
  border-radius:12px;
  cursor:pointer;
  margin-bottom:15px;
}

.full { grid-column: span 2; }

input, select, button {
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:none;
}

button { background:#00c853; color:#fff; font-weight:bold; }

.item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
}

.icons span {
  margin-left:10px;
  cursor:pointer;
}

.hidden{display:none;}
.green{color:#00e676;}
.red{color:#ff5252;}
.yellow{color:#ffd740;}
</style>
</head>

<body>

<header>💰 Meu Financeiro</header>

<div class="container">

<div class="card full">
<h3>Saldo</h3>
<p id="saldo">R$ 0</p>
</div>

<div class="grid">

<div class="card green" onclick="mostrarLista('pago')">
<h3>Pago</h3>
<p id="totalPago">0</p>
</div>

<div class="card yellow" onclick="mostrarLista('agendado')">
<h3>Agendado</h3>
<p id="totalAgendado">0</p>
</div>

<div class="card red" onclick="mostrarLista('pendente')">
<h3>Pendente</h3>
<p id="totalPendente">0</p>
</div>

<div class="card" onclick="toggleReceitas()">
<h3>Receitas</h3>
<p id="receitaTotal">0</p>
</div>

</div>

<div id="lista" class="card hidden"></div>
<div id="painelReceitas" class="card hidden"></div>

<!-- NOVA DESPESA -->
<div class="card" onclick="toggleForm()">
<h3>➕ Nova Despesa</h3>
</div>

<div id="formDespesa" class="card hidden">
<input id="nome" placeholder="Nome">
<input id="valor" type="number" placeholder="Valor total">

<select id="status">
<option value="pendente">Pendente</option>
<option value="agendado">Agendado</option>
<option value="pago">Pago</option>
</select>

<select id="responsavel">
<option value="meu">Meu</option>
<option value="outro">Outro</option>
</select>

<input id="pessoa" placeholder="Nome da pessoa">
<input id="parcelas" type="number" placeholder="Parcelas">

<button onclick="add()">Salvar</button>
</div>

</div>

<script>

let despesas = JSON.parse(localStorage.getItem("despesas")) || [];
let receitas = JSON.parse(localStorage.getItem("receitas")) || [];

let editIndex = null;
let editReceitaIndex = null;

function salvar(){
localStorage.setItem("despesas", JSON.stringify(despesas));
localStorage.setItem("receitas", JSON.stringify(receitas));
atualizar();
}

function toggleForm(){
document.getElementById("formDespesa").classList.toggle("hidden");
editIndex = null;
}

function limparCampos(){
document.getElementById("nome").value="";
document.getElementById("valor").value="";
document.getElementById("pessoa").value="";
document.getElementById("parcelas").value="";
}

function add(){

let nome = document.getElementById("nome").value;
let valor = Number(document.getElementById("valor").value);
let status = document.getElementById("status").value;
let responsavel = document.getElementById("responsavel").value;
let pessoa = document.getElementById("pessoa").value;
let parcelas = Number(document.getElementById("parcelas").value) || 1;

if(editIndex !== null){
despesas[editIndex] = {nome, valor, status, responsavel, pessoa};
} else {
for(let i=1;i<=parcelas;i++){
despesas.push({
nome: nome + (parcelas>1 ? " ("+i+"/"+parcelas+")" : ""),
valor: valor/parcelas,
status,
responsavel,
pessoa
});
}
}

salvar();
limparCampos();
alert("Salvo com sucesso!");
}

function mostrarLista(tipo){
let lista=document.getElementById("lista");
lista.classList.remove("hidden");

let html="<h3>"+tipo.toUpperCase()+"</h3>";

despesas.forEach((d,i)=>{
if(d.status===tipo){
html+=`
<div class="item">
<span>${d.nome} - R$ ${d.valor.toFixed(2)}</span>
<div class="icons">
<span onclick="editar(${i})">✏️</span>
<span onclick="remover(${i})">🗑️</span>
</div>
</div>`;
}
});

lista.innerHTML=html;
}

function editar(i){
let d = despesas[i];

document.getElementById("nome").value = d.nome;
document.getElementById("valor").value = d.valor;
document.getElementById("status").value = d.status;
document.getElementById("responsavel").value = d.responsavel;
document.getElementById("pessoa").value = d.pessoa;

editIndex = i;
document.getElementById("formDespesa").classList.remove("hidden");
}

function remover(i){
if(confirm("Deseja excluir esta despesa?")){
despesas.splice(i,1);
salvar();
}
}

function toggleReceitas(){
let painel = document.getElementById("painelReceitas");
painel.classList.toggle("hidden");

let html = "<h3>Receitas</h3>";

receitas.forEach((r,i)=>{
html += `
<div class="item">
<span>${r.desc} — R$ ${r.valor.toFixed(2)}</span>
<div class="icons">
<span onclick="editarReceita(${i})">✏️</span>
<span onclick="removerReceita(${i})">🗑️</span>
</div>
</div>`;
});

html += `
<button onclick="mostrarFormReceita()">➕ Adicionar Receita</button>

<div id="formReceita" class="hidden">
<input id="descReceita" placeholder="Descrição">
<input id="valorReceita" type="number" placeholder="Valor">
<button onclick="addReceita()">Salvar</button>
</div>
`;

painel.innerHTML = html;
}

function mostrarFormReceita(){
document.getElementById("formReceita").classList.remove("hidden");
editReceitaIndex = null;
}

function addReceita(){
let desc = document.getElementById("descReceita").value;
let valor = Number(document.getElementById("valorReceita").value);

if(editReceitaIndex !== null){
receitas[editReceitaIndex] = {desc, valor};
} else {
receitas.push({desc, valor});
}

salvar();
toggleReceitas();
toggleReceitas();
}

function editarReceita(i){
let r = receitas[i];

toggleReceitas();
toggleReceitas();

setTimeout(()=>{
document.getElementById("descReceita").value = r.desc;
document.getElementById("valorReceita").value = r.valor;
editReceitaIndex = i;
document.getElementById("formReceita").classList.remove("hidden");
},100);
}

function removerReceita(i){
if(confirm("Deseja excluir esta receita?")){
receitas.splice(i,1);
salvar();
toggleReceitas();
toggleReceitas();
}
}

function atualizar(){

let receitaTotal = receitas.reduce((t,r)=> t+r.valor, 0);

let pago=0, agendado=0, pendente=0;

despesas.forEach(d=>{
if(d.responsavel!=="meu") return;

if(d.status==="pago") pago+=d.valor;
if(d.status==="agendado") agendado+=d.valor;
if(d.status==="pendente") pendente+=d.valor;
});

document.getElementById("totalPago").innerText="R$ "+pago.toFixed(2);
document.getElementById("totalAgendado").innerText="R$ "+agendado.toFixed(2);
document.getElementById("totalPendente").innerText="R$ "+pendente.toFixed(2);
document.getElementById("receitaTotal").innerText="R$ "+receitaTotal.toFixed(2);

let saldo=receitaTotal-(pago+agendado+pendente);

let saldoEl=document.getElementById("saldo");
saldoEl.innerText="R$ "+saldo.toFixed(2);
saldoEl.className=saldo>=0?"green":"red";

}

atualizar();

</script>

</body>
</html>

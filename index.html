<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financeiro</title>

<style>
body { font-family: Arial; background:#111; color:#fff; margin:0; }
header { text-align:center; padding:15px; background:#222; }

.container { padding:12px; }

.grid3 {
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

.grid2 {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card {
  background:#1e1e1e;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
}

.greenCard { background:#1b5e20; }
.redCard { background:#b71c1c; }

input, select, button {
  width:100%;
  padding:8px;
  margin-top:5px;
  border-radius:6px;
  border:none;
}

button { background:#00c853; color:#fff; font-weight:bold; }

.item {
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
}

.icons span {
  margin-left:10px;
  cursor:pointer;
}

.hidden{display:none;}
.green{color:#00e676;}
.red{color:#ff5252;}
</style>
</head>

<body>

<header>💰 Meu Financeiro</header>

<div class="container">

<div class="grid3">
<div class="card" onclick="toggleReceitas()">
<h3>Receitas</h3>
<p id="receitaTotal">0</p>
</div>

<div class="card" onclick="toggleDespesas()">
<h3>Despesas</h3>
<p id="gastosTotal">0</p>
</div>

<div class="card">
<h3>Saldo</h3>
<p id="saldo">0</p>
</div>
</div>

<!-- BOTÕES GRANDES -->
<div class="grid2">
<div class="card greenCard" onclick="toggleFormReceita()"> Receita</div>
<div class="card redCard" onclick="toggleFormDespesa()"> Despesa</div>
</div>

<!-- FORM RECEITA -->
<div id="formReceita" class="card hidden">
<label>Descrição</label>
<input id="descReceita">

<label>Valor</label>
<input id="valorReceita" type="number">

<button onclick="addReceita()">Salvar</button>
</div>

<!-- FORM DESPESA -->
<div id="formDespesa" class="card hidden">
<label>Nome</label>
<input id="nome">

<label>Valor</label>
<input id="valor" type="number">

<label>Data</label>
<input id="data" type="date">

<label>Status</label>
<select id="status">
<option value="pendente">Pendente</option>
<option value="agendado">Agendado</option>
<option value="pago">Pago</option>
</select>

<button onclick="add()">Salvar</button>
</div>

<!-- LISTAS -->
<div id="listaReceitas" class="card hidden"></div>
<div id="listaDespesas" class="card hidden"></div>

</div>

<script>

let despesas = JSON.parse(localStorage.getItem("despesas")) || [];
let receitas = JSON.parse(localStorage.getItem("receitas")) || [];

let editIndex = null;
let editReceitaIndex = null;

function salvar(){
localStorage.setItem("despesas", JSON.stringify(despesas));
localStorage.setItem("receitas", JSON.stringify(receitas));
atualizar();
}

function msg(t){ alert(t); }

// TOGGLES
function toggleFormReceita(){
document.getElementById("formReceita").classList.toggle("hidden");
}

function toggleFormDespesa(){
document.getElementById("formDespesa").classList.toggle("hidden");
}

function toggleReceitas(){
let div = document.getElementById("listaReceitas");
div.classList.toggle("hidden");
renderReceitas();
}

function toggleDespesas(){
let div = document.getElementById("listaDespesas");
div.classList.toggle("hidden");
renderDespesas();
}

// RECEITAS
function addReceita(){
let desc = document.getElementById("descReceita").value;
let valor = Number(document.getElementById("valorReceita").value);

if(!desc) return msg("Preencha descrição");
if(!valor) return msg("Preencha valor");

if(editReceitaIndex !== null){
receitas[editReceitaIndex] = {desc, valor};
editReceitaIndex = null;
} else {
receitas.push({desc, valor});
}

document.getElementById("descReceita").value="";
document.getElementById("valorReceita").value="";

salvar();
renderReceitas();
msg("Salvo!");
}

function renderReceitas(){
let div = document.getElementById("listaReceitas");

let html="<h3>Receitas</h3>";

receitas.forEach((r,i)=>{
html+=`
<div class="item">
<span>${r.desc} - R$ ${r.valor.toFixed(2)}</span>
<div class="icons">
<span onclick="editarReceita(${i})">✏️</span>
<span onclick="removerReceita(${i})">🗑️</span>
</div>
</div>`;
});

div.innerHTML = html;
}

function editarReceita(i){
let r = receitas[i];
document.getElementById("descReceita").value = r.desc;
document.getElementById("valorReceita").value = r.valor;
editReceitaIndex = i;
toggleFormReceita();
}

function removerReceita(i){
if(confirm("Excluir receita?")){
receitas.splice(i,1);
salvar();
renderReceitas();
msg("Excluído!");
}
}

// DESPESAS
function add(){

let nome = document.getElementById("nome").value;
let valor = Number(document.getElementById("valor").value);
let data = document.getElementById("data").value;
let status = document.getElementById("status").value;

if(!nome) return msg("Preencha nome");
if(!valor) return msg("Preencha valor");
if(!data) return msg("Preencha data");

if(editIndex !== null){
despesas[editIndex] = {nome, valor, data, status};
editIndex = null;
} else {
despesas.push({nome, valor, data, status});
}

document.getElementById("nome").value="";
document.getElementById("valor").value="";
document.getElementById("data").value="";

salvar();
renderDespesas();
msg("Salvo!");
}

function renderDespesas(){
let div = document.getElementById("listaDespesas");

let html="<h3>Despesas</h3>";

despesas.forEach((d,i)=>{
html+=`
<div class="item">
<span>${d.nome} - R$ ${d.valor.toFixed(2)}</span>
<div class="icons">
<span onclick="pagar(${i})">🅿️</span>
<span onclick="agendar(${i})">🅰️</span>
<span onclick="editar(${i})">✏️</span>
<span onclick="remover(${i})">🗑️</span>
</div>
</div>`;
});

div.innerHTML = html;
}

function pagar(i){
if(confirm("Marcar como PAGO?")){
despesas[i].status="pago";
salvar();
renderDespesas();
}
}

function agendar(i){
if(confirm("Marcar como AGENDADO?")){
despesas[i].status="agendado";
salvar();
renderDespesas();
}
}

function editar(i){
let d = despesas[i];

document.getElementById("nome").value = d.nome;
document.getElementById("valor").value = d.valor;
document.getElementById("data").value = d.data;
document.getElementById("status").value = d.status;

editIndex = i;
toggleFormDespesa();
}

function remover(i){
if(confirm("Excluir despesa?")){
despesas.splice(i,1);
salvar();
renderDespesas();
msg("Excluído!");
}
}

// TOTAL
function atualizar(){

let receitaTotal = receitas.reduce((t,r)=> t+r.valor, 0);
let gastosTotal = despesas.reduce((t,d)=> t+d.valor, 0);

document.getElementById("receitaTotal").innerText="R$ "+receitaTotal.toFixed(2);
document.getElementById("gastosTotal").innerText="R$ "+gastosTotal.toFixed(2);

let saldo=receitaTotal-gastosTotal;

let saldoEl=document.getElementById("saldo");
saldoEl.innerText="R$ "+saldo.toFixed(2);
saldoEl.className=saldo>=0?"green":"red";
}

atualizar();

</script>

</body>
</html>

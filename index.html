<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Meu Financeiro</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* (mantive seu CSS original intacto) */
</style>
</head>

<body>

<div id="toast" class="toast"></div>
<div class="overlay" id="overlay" onclick="fecharDrawer()"></div>

<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title" id="drawerTitle">Novo</div>
  <div id="drawerContent"></div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="header-title">💰 Meu Financeiro</div>
    <!-- REMOVIDO BOTÃO CARTÕES -->
  </div>

  <div class="month-wrap">
    <div class="month-scroll" id="monthScroll"></div>
  </div>
</div>

<!-- RESTO NORMAL -->
<div style="max-width:520px;margin:auto;">
  <div class="balance-card">
    <div class="balance-label">Saldo</div>
    <div class="balance-value" id="saldoTotal">R$ 0,00</div>

    <div class="balance-grid">
      <div class="bal-item">
        <div class="bal-item-label">▲ Receitas</div>
        <div class="bal-item-value green" id="resumoReceita">R$ 0,00</div>
      </div>
      <div class="bal-item">
        <div class="bal-item-label">▼ Despesas</div>
        <div class="bal-item-value red" id="resumoDespesa">R$ 0,00</div>
      </div>
    </div>
  </div>

  <div class="terceiros-strip hidden" id="terceirosStrip">
    <div class="terceiros-label">⚠️ Despesas de terceiros</div>
    <div class="terceiros-value" id="terceirosValue">R$ 0,00</div>
  </div>
</div>

<div class="container">

  <div id="abaLancamentos">
    <div class="chart-box">
      <div class="section-title">Despesas por Categoria</div>
      <canvas id="meuGrafico"></canvas>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="filtrar('pendente',this)">⏳</button>
      <button class="filter-btn" onclick="filtrar('agendado',this)">📅</button>
      <button class="filter-btn" onclick="filtrar('pago',this)">✅</button>
      <button class="filter-btn" onclick="filtrar('receitas',this)">💚</button>
    </div>

    <div id="listaPrincipal"></div>
  </div>

</div>

<!-- FAB -->
<div class="fab-wrap">
  <div class="fab-menu" id="fabMenu">
    <button class="fab-option receita" onclick="abrirDrawer('receita')">💚 Receita</button>
    <button class="fab-option despesa" onclick="abrirDrawer('despesa')">🔴 Despesa</button>
    <button class="fab-option categoria" onclick="novaCategoria()">📁 Categoria</button>
    <button class="fab-option cartao" onclick="abrirDrawer('cartao')">🃏 Cartão</button>
  </div>
  <button class="fab" id="fabBtn" onclick="toggleFab()">+</button>
</div>

<script>

// ================= DADOS =================
let dados = JSON.parse(localStorage.getItem('fin_dados')) || [];
let cartoes = JSON.parse(localStorage.getItem('fin_cartoes')) || [];
let categoriasCustom = JSON.parse(localStorage.getItem('fin_categorias')) || [];

let filtroAtual = 'pendente';
let filtroCategoria = null;
let mesSelecionado = '';
let chart;
let editandoId = null;
let cardExpandido = null;

// ================= MESES =================
const MESES = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];

// ================= INIT =================
function init() {
  const hoje = new Date();
  mesSelecionado = MESES[hoje.getMonth()];
  renderMonths();
  atualizar();
}

// ================= SALVAR =================
function salvar() {
  localStorage.setItem('fin_dados', JSON.stringify(dados));
  localStorage.setItem('fin_cartoes', JSON.stringify(cartoes));
  localStorage.setItem('fin_categorias', JSON.stringify(categoriasCustom));
}

// ================= NOVA CATEGORIA =================
function novaCategoria() {
  const nome = prompt('Nome da categoria:');
  if (!nome) return;

  if (categoriasCustom.includes(nome)) {
    toast('Já existe!', 'error');
    return;
  }

  categoriasCustom.push(nome);
  salvar();
  toast('Categoria criada!', 'success');
}

// ================= TOGGLE CARD =================
function toggleCard(id) {
  cardExpandido = cardExpandido === id ? null : id;
  atualizar();
}

/* ================= FORMULARIO ================= */
function abrirDrawer(tipo, item=null) {
  editandoId = item ? item.id : null;
  const drawerTitle = document.getElementById('drawerTitle');
  const drawerContent = document.getElementById('drawerContent');

  let html = '';
  if(tipo==='despesa' || tipo==='receita') {
    html += `<div class="form-group">
               <label>Descrição</label>
               <input type="text" id="inputDesc" value="${item?item.desc:''}" placeholder="Ex: Mercado">
             </div>
             <div class="form-group">
               <label>Valor</label>
               <input type="number" id="inputValor" value="${item?item.valor:''}" placeholder="Ex: 50">
             </div>
             <div class="form-group">
               <label>Categoria</label>
               <select id="inputCategoria">
                 <option value="">Selecione</option>`;
    // categorias fixas
    ['Cartão','Boleto','Fixa','Outros'].forEach(c=>{
      let selected = item && item.categoria===c ? 'selected' : '';
      html += `<option value="${c}" ${selected}>${c}</option>`;
    });
    // categorias custom
    categoriasCustom.forEach(c=>{
      let selected = item && item.categoria===c ? 'selected' : '';
      html += `<option value="${c}" ${selected}>${c}</option>`;
    });

    html += `</select>
             </div>
             <div class="form-group">
               <label>Data</label>
               <input type="date" id="inputData" value="${item?item.data:''}">
             </div>
             <button class="btn btn-primary" onclick="formDespesa('${tipo}')">Salvar</button>`;
  }

  drawerContent.innerHTML = html;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('active');
}

function fecharDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('active');
}

// ================= FORM DESPESA =================
function formDespesa(tipo) {
  const desc = document.getElementById('inputDesc').value.trim();
  const valor = parseFloat(document.getElementById('inputValor').value);
  const categoria = document.getElementById('inputCategoria').value;
  const data = document.getElementById('inputData').value;

  if(!desc || !valor || !categoria || !data) {
    toast('Preencha todos os campos!', 'error');
    return;
  }

  if(editandoId) {
    let idx = dados.findIndex(d=>d.id===editandoId);
    if(idx>-1) {
      dados[idx] = {id: editandoId, tipo, desc, valor, categoria, data};
      toast('Atualizado!', 'success');
    }
  } else {
    dados.push({
      id: Date.now(),
      tipo,
      desc,
      valor,
      categoria,
      data
    });
    toast('Adicionado!', 'success');
  }

  salvar();
  fecharDrawer();
  atualizar();
}

// ================= TOAST =================
function toast(msg, tipo='success') {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.className = `toast ${tipo} show`;
  setTimeout(()=>{ t.className='toast'; },2500);
}

// ================= FILTRO =================
function filtrar(status, btn=null) {
  filtroAtual = status;
  if(btn) {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  }
  atualizar();
}

// ================= MESES =================
function renderMonths() {
  const container = document.getElementById('monthScroll');
  container.innerHTML = '';
  MESES.forEach(m=>{
    let active = m===mesSelecionado ? 'active' : '';
    container.innerHTML += `<div class="month-item ${active}" onclick="selecionarMes('${m}')">${m}</div>`;
  });
}

function selecionarMes(m) {
  mesSelecionado = m;
  renderMonths();
  atualizar();
}

// ================= ATUALIZAR =================
function atualizar() {
  const lista = document.getElementById('listaPrincipal');
  const mes = mesSelecionado;
  lista.innerHTML = '';

  let saldo=0, receita=0, despesa=0;
  let categoriasResumo = {};

  dados.forEach(d=>{
    const dataMes = new Date(d.data).getMonth();
    if(MESES[dataMes]!==mes) return;

    if(d.tipo==='receita') receita+=d.valor;
    else despesa+=d.valor;

    // resumo categorias
    if(d.tipo!=='receita') {
      categoriasResumo[d.categoria] = (categoriasResumo[d.categoria]||0)+d.valor;
    }

    // filtro status
    if(filtroAtual==='pendente' && d.tipo==='despesa' || filtroAtual==='receitas' && d.tipo==='receita') {
      lista.innerHTML += `<div class="item-card" onclick="toggleCard(${d.id})">
                            <div>${d.desc} - ${d.categoria}</div>
                            <div>R$ ${d.valor.toFixed(2)}</div>
                          </div>`;
    }
  });

  document.getElementById('saldoTotal').innerText = `R$ ${(receita-despesa).toFixed(2)}`;
  document.getElementById('resumoReceita').innerText = `R$ ${receita.toFixed(2)}`;
  document.getElementById('resumoDespesa').innerText = `R$ ${despesa.toFixed(2)}`;

  // atualizar gráfico
  atualizarGrafico(categoriasResumo);
}

// ================= GRAFICO =================
function atualizarGrafico(resumo) {
  const ctx = document.getElementById('meuGrafico').getContext('2d');
  const labels = Object.keys(resumo);
  const data = Object.values(resumo);

  if(chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets:[{data, backgroundColor: labels.map(()=>`hsl(${Math.random()*360},70%,60%)`)}]
    },
    options: {
      onClick: (e, elements)=>{
        if(elements.length>0) {
          const idx = elements[0].index;
          filtroCategoria = labels[idx];
          atualizar();
        }
      },
      plugins: { legend: { position:'bottom' } }
    }
  });
}

// ================= FAB =================
function toggleFab() {
  document.getElementById('fabMenu').classList.toggle('active');
}

// ================= INICIAR =================
init();

</script>
</body>
</html>

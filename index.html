<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Financeiro Pro</title>
    <style>
        body { font-family: 'Segoe UI', Arial; background:#121212; color:#e0e0e0; margin:0; padding-bottom: 50px; }
        header { text-align:center; padding:20px; background:#1f1f1f; border-bottom: 2px solid #00c853; font-weight: bold; font-size: 1.2em; }
        .container { padding:15px; max-width: 500px; margin: auto; }
        
        /* Cards de Resumo */
        .resumo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { background:#1e1e1e; padding:15px; border-radius:12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .full { grid-column: span 2; }
        .card h3 { margin: 0; font-size: 0.9em; color: #aaa; }
        .card p { margin: 5px 0 0; font-size: 1.3em; font-weight: bold; }
        
        /* Cores */
        .saldo-positivo { color: #00e676; }
        .saldo-negativo { color: #ff5252; }
        .txt-pago { color: #00e676; }
        .txt-agendado { color: #ffd740; }
        .txt-pendente { color: #ff5252; }

        /* Listagem */
        .secao-titulo { margin-top: 20px; border-left: 4px solid #00c853; padding-left: 10px; font-size: 1.1em; }
        .item-lista { background: #252525; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid transparent; }
        .item-pago { border-right-color: #00e676; }
        .item-agendado { border-right-color: #ffd740; }
        .item-pendente { border-right-color: #ff5252; }
        .item-info span { display: block; font-size: 0.8em; color: #888; }

        /* Formulário */
        input, select, button { width:100%; padding:12px; margin-top:10px; border-radius:8px; border:none; box-sizing: border-box; }
        input, select { background: #333; color: #fff; }
        button { background:#00c853; color:#fff; font-weight:bold; cursor:pointer; }
        .btn-toggle { background: #333; margin-bottom: 20px; }
        .btn-del { width: auto; padding: 5px 10px; background: #cf6679; margin: 0; }

        .hidden { display: none; }
    </style>
</head>
<body>

<header>💰 MEU FINANCEIRO</header>

<div class="container">
    <div class="resumo-grid">
        <div class="card full">
            <h3>Saldo Disponível (Meu)</h3>
            <p id="saldo" class="saldo-positivo">R$ 0,00</p>
        </div>
        <div class="card">
            <h3>Pago</h3>
            <p id="totalPago" class="txt-pago">R$ 0</p>
        </div>
        <div class="card">
            <h3>Agendado</h3>
            <p id="totalAgendado" class="txt-agendado">R$ 0</p>
        </div>
        <div class="card">
            <h3>Pendente</h3>
            <p id="totalPendente" class="txt-pendente">R$ 0</p>
        </div>
        <div class="card full">
            <h3>Receitas Totais</h3>
            <p id="receitaTotal" style="color: skyblue">R$ 0</p>
        </div>
    </div>

    <button class="btn-toggle" onclick="toggleForm('formDespesa')">➕ Nova Despesa / Cartão</button>
    
    <div id="formDespesa" class="card hidden">
        <input id="nome" placeholder="Ex: Cama, Perfume, Aluguel">
        <input id="valor" type="number" placeholder="Valor Total">
        <input id="parcelas" type="number" placeholder="Parcelas (Ex: 10)">
        
        <select id="categoria">
            <option value="Contas Fixas">Contas Fixas</option>
            <option value="Cartão Visa">Cartão Visa</option>
            <option value="Cartão Elo">Cartão Elo</option>
            <option value="Boleto">Boleto</option>
            <option value="Outros">Outros</option>
        </select>

        <select id="status">
            <option value="pendente">Pendente</option>
            <option value="agendado">Agendado</option>
            <option value="pago">Pago</option>
        </select>

        <select id="responsavel">
            <option value="meu">Minha Despesa</option>
            <option value="outro">De outra pessoa</option>
        </select>
        <input id="pessoa" placeholder="Nome da pessoa (se for 'Outro')">

        <button onclick="addDespesa()">SALVAR DESPESA</button>
    </div>

    <button class="btn-toggle" onclick="toggleForm('formReceita')">💸 Adicionar Receita</button>
    <div id="formReceita" class="card hidden">
        <input id="descReceita" placeholder="Ex: Salário, Venda">
        <input id="valorReceita" type="number" placeholder="Valor">
        <button onclick="addReceita()">SALVAR RECEITA</button>
    </div>

    <div class="secao-titulo">Detalhamento</div>
    <div id="listaGeral"></div>
</div>

<script>
    let despesas = JSON.parse(localStorage.getItem("despesas")) || [];
    let receitas = JSON.parse(localStorage.getItem("receitas")) || [];

    function salvar() {
        localStorage.setItem("despesas", JSON.stringify(despesas));
        localStorage.setItem("receitas", JSON.stringify(receitas));
        atualizarTela();
    }

    function toggleForm(id) {
        document.getElementById(id).classList.toggle("hidden");
    }

    function addDespesa() {
        const nome = document.getElementById("nome").value;
        const valorTotal = Number(document.getElementById("valor").value);
        const parcelas = Number(document.getElementById("parcelas").value) || 1;
        const status = document.getElementById("status").value;
        const categoria = document.getElementById("categoria").value;
        const responsavel = document.getElementById("responsavel").value;
        const pessoa = document.getElementById("pessoa").value;

        if(!nome || !valorTotal) return alert("Preencha nome e valor!");

        for(let i=1; i<=parcelas; i++) {
            despesas.push({
                id: Date.now() + i,
                nome: `${nome} (${i}/${parcelas})`,
                valor: valorTotal / parcelas,
                status,
                categoria,
                responsavel,
                pessoa: responsavel === 'outro' ? pessoa : 'Eu'
            });
        }
        
        salvar();
        toggleForm('formDespesa');
        limparCampos();
    }

    function addReceita() {
        const desc = document.getElementById("descReceita").value;
        const valor = Number(document.getElementById("valorReceita").value);
        if(!desc || !valor) return;
        receitas.push({ id: Date.now(), desc, valor });
        salvar();
        toggleForm('formReceita');
    }

    function removerItem(id, tipo) {
        if(!confirm("Excluir este item?")) return;
        if(tipo === 'despesa') despesas = despesas.filter(d => d.id !== id);
        else receitas = receitas.filter(r => r.id !== id);
        salvar();
    }

    function atualizarTela() {
        const lista = document.getElementById("listaGeral");
        lista.innerHTML = "";
        
        let totalPago = 0, totalAgendado = 0, totalPendente = 0;
        let receitaSoma = receitas.reduce((acc, r) => acc + r.valor, 0);

        // Renderizar Despesas
        despesas.forEach(d => {
            // Somar apenas se for "meu"
            if(d.responsavel === "meu") {
                if(d.status === "pago") totalPago += d.valor;
                if(d.status === "agendado") totalAgendado += d.valor;
                if(d.status === "pendente") totalPendente += d.valor;
            }

            const div = document.createElement("div");
            div.className = `item-lista item-${d.status}`;
            div.innerHTML = `
                <div class="item-info">
                    <strong>${d.nome}</strong>
                    <span>${d.categoria} | Ref: ${d.pessoa}</span>
                </div>
                <div style="text-align: right">
                    <b>R$ ${d.valor.toFixed(2)}</b><br>
                    <button class="btn-del" onclick="removerItem(${d.id}, 'despesa')">X</button>
                </div>
            `;
            lista.appendChild(div);
        });

        // Atualizar Resumos
        document.getElementById("totalPago").innerText = `R$ ${totalPago.toFixed(2)}`;
        document.getElementById("totalAgendado").innerText = `R$ ${totalAgendado.toFixed(2)}`;
        document.getElementById("totalPendente").innerText = `R$ ${totalPendente.toFixed(2)}`;
        document.getElementById("receitaTotal").innerText = `R$ ${receitaSoma.toFixed(2)}`;
        
        const saldoFinal = receitaSoma - (totalPago + totalAgendado + totalPendente);
        const saldoEl = document.getElementById("saldo");
        saldoEl.innerText = `R$ ${saldoFinal.toFixed(2)}`;
        saldoEl.className = saldoFinal >= 0 ? "saldo-positivo" : "saldo-negativo";
    }

    function limparCampos() {
        document.querySelectorAll('input').forEach(i => i.value = "");
    }

    atualizarTela();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financeiro</title>

<style>
body { font-family: Arial; background:#111; color:#fff; margin:0; }
header { text-align:center; padding:15px; background:#222; }

.container { padding:15px; }

.card {
  background:#1e1e1e;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

.topo {
  display:flex;
  justify-content:space-between;
}

.topo div {
  width:32%;
}

button, input, select {
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:none;
}

button { background:#00c853; color:#fff; font-weight:bold; }

.item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
}

.icons span {
  margin-left:10px;
  cursor:pointer;
}

.hidden{display:none;}
</style>
</head>

<body>

<header>💰 Meu Financeiro</header>

<div class="container">

<!-- DASHBOARD -->
<div class="card topo">
<div>
<h4>Receitas</h4>
<p id="receitaTotal">0</p>
</div>
<div>
<h4>Despesas</h4>
<p id="despesaTotal">0</p>
</div>
<div>
<h4>Saldo</h4>
<p id="saldo">0</p>
</div>
</div>

<!-- MÊS -->
<div class="card">
<select id="mesAtual" onchange="atualizar()"></select>
</div>

<!-- LISTA -->
<div id="lista" class="card"></div>

<!-- RECEITAS -->
<div class="card">
<h3>Receitas</h3>
<div id="listaReceitas"></div>

<input id="descReceita" placeholder="Descrição">
<input id="valorReceita" type="number" placeholder="Valor">
<button onclick="addReceita()">Adicionar Receita</button>
</div>

<!-- NOVA DESPESA -->
<div class="card">
<h3>➕ Nova Despesa</h3>

<input id="nome" placeholder="Nome">
<input id="valor" type="number" placeholder="Valor">

<select id="tipo" onchange="mudarTipo()">
<option value="normal">Normal</option>
<option value="fixa">Fixa</option>
<option value="cartao">Cartão</option>
<option value="boleto">Boleto</option>
<option value="outros">Outros</option>
</select>

<input id="data" type="date">

<div id="parcelasDiv" class="hidden">
<input id="parcelas" type="number" placeholder="Parcelas">
</div>

<div id="cartaoDiv" class="hidden">
<select id="cartao">
<option>Visa</option>
<option>Hipercard</option>
<option>Mastercard</option>
<option>Elo</option>
</select>
<input id="novoCartao" placeholder="Novo cartão">
</div>

<button onclick="addDespesa()">Salvar</button>
</div>

</div>

<script>

let despesas = JSON.parse(localStorage.getItem("despesas")) || [];
let receitas = JSON.parse(localStorage.getItem("receitas")) || [];

let hoje = new Date();
let ano = hoje.getFullYear();

function gerarMeses(){
let select = document.getElementById("mesAtual");
let meses = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

meses.forEach((m,i)=>{
let opt = document.createElement("option");
opt.value = i;
opt.innerText = m;
if(i === hoje.getMonth()) opt.selected = true;
select.appendChild(opt);
});
}

function mudarTipo(){
let tipo = document.getElementById("tipo").value;

document.getElementById("parcelasDiv").classList.toggle("hidden",
!(tipo==="cartao"||tipo==="boleto"||tipo==="outros"));

document.getElementById("cartaoDiv").classList.toggle("hidden",
tipo!=="cartao");
}

function addReceita(){
let desc = document.getElementById("descReceita").value;
let valor = Number(document.getElementById("valorReceita").value);

receitas.push({desc, valor});
salvar();
}

function addDespesa(){

let nome = document.getElementById("nome").value;
let valor = Number(document.getElementById("valor").value);
let tipo = document.getElementById("tipo").value;
let data = new Date(document.getElementById("data").value);

let parcelas = Number(document.getElementById("parcelas").value) || 1;

let cartao = document.getElementById("cartao").value;
let novo = document.getElementById("novoCartao").value;
if(novo) cartao = novo;

if(tipo==="fixa"){
for(let i=0;i<12;i++){
let d = new Date(data);
d.setMonth(d.getMonth()+i);

despesas.push({
nome, valor,
data:d.toISOString(),
status:"pendente",
tipo
});
}
} else {

for(let i=0;i<parcelas;i++){
let d = new Date(data);
d.setMonth(d.getMonth()+i);

despesas.push({
nome,
valor: valor/parcelas,
data:d.toISOString(),
status:"pendente",
tipo,
cartao: tipo==="cartao"?cartao:null,
parcela: parcelas>1 ? (i+1)+"/"+parcelas : null
});
}

}

salvar();
}

function salvar(){
localStorage.setItem("despesas", JSON.stringify(despesas));
localStorage.setItem("receitas", JSON.stringify(receitas));
atualizar();
}

function atualizar(){

let mes = Number(document.getElementById("mesAtual").value);

let lista = document.getElementById("lista");
lista.innerHTML = "<h3>Despesas</h3>";

let totalDespesa = 0;

despesas.forEach((d,i)=>{
let dt = new Date(d.data);

if(dt.getMonth()===mes){

totalDespesa += d.valor;

lista.innerHTML += `
<div class="item">
<span>${d.nome} - R$ ${d.valor.toFixed(2)}</span>
<div class="icons">
<span onclick="editar(${i})">✏️</span>
<span onclick="remover(${i})">🗑️</span>
</div>
</div>`;
}
});

let receitaTotal = receitas.reduce((t,r)=>t+r.valor,0);

document.getElementById("receitaTotal").innerText="R$ "+receitaTotal.toFixed(2);
document.getElementById("despesaTotal").innerText="R$ "+totalDespesa.toFixed(2);
document.getElementById("saldo").innerText="R$ "+(receitaTotal-totalDespesa).toFixed(2);

let listaR = document.getElementById("listaReceitas");
listaR.innerHTML="";

receitas.forEach((r,i)=>{
listaR.innerHTML+=`
<div class="item">
<span>${r.desc} - R$ ${r.valor}</span>
<div class="icons">
<span onclick="editarReceita(${i})">✏️</span>
<span onclick="removerReceita(${i})">🗑️</span>
</div>
</div>`;
});

}

function remover(i){
despesas.splice(i,1);
salvar();
}

function removerReceita(i){
receitas.splice(i,1);
salvar();
}

function editar(i){
let d = despesas[i];
alert("Edição simplificada por enquanto (vamos melhorar depois)");
}

function editarReceita(i){
let r = receitas[i];
document.getElementById("descReceita").value = r.desc;
document.getElementById("valorReceita").value = r.valor;
receitas.splice(i,1);
salvar();
}

gerarMeses();
atualizar();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financeiro</title>

<style>
body { font-family: Arial; background:#111; color:#fff; margin:0; }
header { text-align:center; padding:15px; background:#222; }

.container { padding:12px; }

.grid3 {
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

.grid2 {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card {
  background:#1e1e1e;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
  text-align:center; /* CENTRALIZADO */
}

.subcard {
  background:#2a2a2a;
  padding:10px;
  border-radius:8px;
  margin:5px 0;
  cursor:pointer;
  text-align:center;
}

.item {
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
}

.icons span {
  margin-left:10px;
  cursor:pointer;
}

.hidden{display:none;}
.green{color:#00e676;}
.red{color:#ff5252;}
</style>
</head>

<body>

<header>💰 Meu Financeiro</header>

<div class="container">

<!-- TOPO -->
<div class="grid3">
<div class="card" onclick="toggleReceitas()">
Receitas<br><span id="receitaTotal"></span>
</div>

<div class="card" onclick="toggleDespesas()">
Despesas<br><span id="gastosTotal"></span>
</div>

<div class="card">
Saldo<br><span id="saldo"></span>
</div>
</div>

<!-- BOTÕES -->
<div class="grid2">
<div class="card" onclick="abrir('formReceita')">Receita</div>
<div class="card" onclick="abrir('formDespesa')">Despesa</div>
</div>

<!-- FORM RECEITA -->
<div id="formReceita" class="card hidden">
<input id="descReceita" placeholder="Descrição">
<input id="valorReceita" type="number" placeholder="Valor">
<button onclick="addReceita()">Salvar</button>
</div>

<!-- FORM DESPESA -->
<div id="formDespesa" class="card hidden">
<input id="nome" placeholder="Nome">
<input id="valor" type="number" placeholder="Valor">
<input id="data" type="date">
<select id="status">
<option value="pendente">Pendente</option>
<option value="agendado">Agendado</option>
<option value="pago">Pago</option>
</select>
<input id="categoria" placeholder="Ex: Visa, Elo...">
<button onclick="add()">Salvar</button>
</div>

<!-- AREA -->
<div id="area"></div>

</div>

<script>

let despesas = JSON.parse(localStorage.getItem("despesas")) || [];
let receitas = JSON.parse(localStorage.getItem("receitas")) || [];

let editIndex = null;
let editReceitaIndex = null;

function salvar(){
localStorage.setItem("despesas", JSON.stringify(despesas));
localStorage.setItem("receitas", JSON.stringify(receitas));
atualizar();
}

// 🔥 CONTROLE (CORREÇÃO DO BUG DE TELA)
function fecharTudo(){
document.getElementById("formReceita").classList.add("hidden");
document.getElementById("formDespesa").classList.add("hidden");
document.getElementById("area").innerHTML="";
}

function abrir(id){
fecharTudo();
document.getElementById(id).classList.remove("hidden");
}

// RECEITAS (SEM ALTERAR LÓGICA)
function toggleReceitas(){
fecharTudo();

let html="<h3>Receitas</h3>";

receitas.forEach((r,i)=>{
html+=`
<div class="item">
<span>${r.desc} - R$ ${r.valor.toFixed(2)}</span>
<div class="icons">
<span onclick="editarReceita(${i})">✏️</span>
<span onclick="removerReceita(${i})">🗑️</span>
</div>
</div>`;
});

document.getElementById("area").innerHTML=html;
}

// 🔥 DESPESAS → AGORA MOSTRA STATUS (PEDIDO SEU)
function toggleDespesas(){
fecharTudo();

let html=`
<div class="grid3">
<div class="subcard" onclick="filtroStatus('pendente')">Pendente</div>
<div class="subcard" onclick="filtroStatus('agendado')">Agendado</div>
<div class="subcard" onclick="filtroStatus('pago')">Pago</div>
</div>
`;

// 🔥 SUBTOTAL POR CATEGORIA (SEM QUEBRAR)
let categorias = {};

despesas.forEach(d=>{
if(!d.categoria) return;
if(!categorias[d.categoria]) categorias[d.categoria]=0;
categorias[d.categoria]+=d.valor;
});

if(Object.keys(categorias).length){
html+="<h3>Categorias</h3>";

for(let cat in categorias){
html+=`
<div class="subcard" onclick="filtroCategoria('${cat}')">
${cat} - R$ ${categorias[cat].toFixed(2)}
</div>`;
}
}

document.getElementById("area").innerHTML=html;
}

// FILTROS (SEM MUDAR SUA LÓGICA)
function filtroStatus(tipo){
let html="<h3>"+tipo.toUpperCase()+"</h3>";

despesas.forEach((d,i)=>{
if(d.status===tipo){
html+=itemHTML(d,i);
}
});

document.getElementById("area").innerHTML=html;
}

function filtroCategoria(cat){
let html="<h3>"+cat+"</h3>";

despesas.forEach((d,i)=>{
if(d.categoria===cat){
html+=itemHTML(d,i);
}
});

document.getElementById("area").innerHTML=html;
}

// ITEM PADRÃO (MESMA LÓGICA)
function itemHTML(d,i){
return `
<div class="item">
<span>${d.nome} - R$ ${d.valor.toFixed(2)}</span>
<div class="icons">
<span onclick="pagar(${i})">🅿️</span>
<span onclick="agendar(${i})">🅰️</span>
<span onclick="editar(${i})">✏️</span>
<span onclick="remover(${i})">🗑️</span>
</div>
</div>`;
}

// AÇÕES (INALTERADO)
function pagar(i){
if(confirm("Confirmar pagamento?")){
despesas[i].status="pago";
salvar();
toggleDespesas();
}
}

function agendar(i){
if(confirm("Confirmar agendamento?")){
despesas[i].status="agendado";
salvar();
toggleDespesas();
}
}

function remover(i){
if(confirm("Excluir?")){
despesas.splice(i,1);
salvar();
toggleDespesas();
}
}

// ADD (INALTERADO)
function add(){
let nome = nomeEl.value;
let valor = Number(valorEl.value);
let data = dataEl.value;
let status = statusEl.value;
let categoria = categoriaEl.value;

if(!nome || !valor || !data) return alert("Preencha tudo");

despesas.push({nome,valor,data,status,categoria});

salvar();
fecharTudo();
}

function addReceita(){
let desc = descReceita.value;
let valor = Number(valorReceita.value);

if(!desc || !valor) return alert("Preencha tudo");

receitas.push({desc,valor});

salvar();
fecharTudo();
}

// TOTAL
function atualizar(){
let r = receitas.reduce((t,x)=>t+x.valor,0);
let g = despesas.reduce((t,x)=>t+x.valor,0);

receitaTotal.innerText="R$ "+r.toFixed(2);
gastosTotal.innerText="R$ "+g.toFixed(2);

let s = r-g;
saldo.innerText="R$ "+s.toFixed(2);
saldo.className=s>=0?"green":"red";
}

atualizar();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financeiro</title>

<style>
body { font-family: Arial; background:#111; color:#fff; margin:0; }
header { text-align:center; padding:15px; background:#222; }

.container { padding:12px; }

.grid3 {
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

.card {
  background:#1e1e1e;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

input, select, button {
  width:100%;
  padding:8px;
  margin-top:5px;
  border-radius:6px;
  border:none;
}

button { background:#00c853; color:#fff; font-weight:bold; }

.item {
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
}

.icons span {
  margin-left:8px;
  cursor:pointer;
}

.hidden{display:none;}
.green{color:#00e676;}
.red{color:#ff5252;}
.yellow{color:#ffd740;}
</style>
</head>

<body>

<header>💰 Meu Financeiro</header>

<div class="container">

<div class="grid3">
<div class="card green"><h3>Receitas</h3><p id="receitaTotal">0</p></div>
<div class="card red"><h3>Gastos</h3><p id="gastosTotal">0</p></div>
<div class="card"><h3>Saldo</h3><p id="saldo">0</p></div>
</div>

<div class="grid3">
<div class="card" onclick="mostrarLista('pendente')">Pendente</div>
<div class="card" onclick="mostrarLista('agendado')">Agendado</div>
<div class="card" onclick="mostrarLista('pago')">Pago</div>
</div>

<div id="lista" class="card hidden"></div>

<div class="card">
<h3>➕ Nova Despesa</h3>

<label>Nome</label>
<input id="nome">

<label>Valor</label>
<input id="valor" type="number">

<label>Data</label>
<input id="data" type="date">

<label>Categoria</label>
<select id="categoria">
<option>Cartão</option>
<option>Boleto</option>
<option>Fixa</option>
<option>Outros</option>
</select>

<label>Status</label>
<select id="status">
<option value="pendente">Pendente</option>
<option value="agendado">Agendado</option>
<option value="pago">Pago</option>
</select>

<label>Parcelas</label>
<input id="parcelas" type="number">

<button onclick="add()">Salvar</button>
</div>

<div class="card">
<h3>➕ Receita</h3>

<label>Descrição</label>
<input id="descReceita">

<label>Valor</label>
<input id="valorReceita" type="number">

<button onclick="addReceita()">Salvar Receita</button>
</div>

</div>

<script>

let despesas = JSON.parse(localStorage.getItem("despesas")) || [];
let receitas = JSON.parse(localStorage.getItem("receitas")) || [];

let editIndex = null;

function msg(text){
alert(text);
}

function salvar(){
localStorage.setItem("despesas", JSON.stringify(despesas));
localStorage.setItem("receitas", JSON.stringify(receitas));
atualizar();
}

function limpar(){
document.getElementById("nome").value="";
document.getElementById("valor").value="";
document.getElementById("data").value="";
document.getElementById("parcelas").value="";
}

function add(){

let nome = document.getElementById("nome").value;
let valor = Number(document.getElementById("valor").value);
let data = document.getElementById("data").value;
let categoria = document.getElementById("categoria").value;
let status = document.getElementById("status").value;
let parcelas = Number(document.getElementById("parcelas").value) || 1;

if(!nome) return msg("Preencha o NOME");
if(!valor) return msg("Preencha o VALOR");
if(!data) return msg("Preencha a DATA");

for(let i=1;i<=parcelas;i++){
despesas.push({
nome,
valor: valor/parcelas,
data,
categoria,
status
});
}

salvar();
limpar();
msg("Despesa salva!");
}

function mostrarLista(tipo){
let lista=document.getElementById("lista");
lista.classList.remove("hidden");

let html="<h3>"+tipo.toUpperCase()+"</h3>";

despesas.forEach((d,i)=>{
if(d.status===tipo){
html+=`
<div class="item">
<span>${d.nome} - R$ ${d.valor.toFixed(2)}</span>
<div class="icons">
<select onchange="mudarStatus(${i}, this.value)">
<option>...</option>
<option value="pago">Pago</option>
<option value="agendado">Agendar</option>
</select>
<span onclick="editar(${i})">✏️</span>
<span onclick="remover(${i})">🗑️</span>
</div>
</div>`;
}
});

lista.innerHTML=html;
}

function mudarStatus(i, novo){
despesas[i].status = novo;
salvar();
mostrarLista(novo);
}

function editar(i){
let d = despesas[i];

document.getElementById("nome").value = d.nome;
document.getElementById("valor").value = d.valor;
document.getElementById("data").value = d.data;
document.getElementById("categoria").value = d.categoria;
document.getElementById("status").value = d.status;

editIndex = i;
}

function remover(i){
if(confirm("Excluir despesa?")){
despesas.splice(i,1);
salvar();
msg("Excluído!");
}
}

function addReceita(){
let desc = document.getElementById("descReceita").value;
let valor = Number(document.getElementById("valorReceita").value);

if(!desc) return msg("Preencha a descrição");
if(!valor) return msg("Preencha o valor");

receitas.push({desc, valor});

salvar();
msg("Receita salva!");
}

function atualizar(){

let receitaTotal = receitas.reduce((t,r)=> t+r.valor, 0);
let gastosTotal = despesas.reduce((t,d)=> t+d.valor, 0);

document.getElementById("receitaTotal").innerText="R$ "+receitaTotal.toFixed(2);
document.getElementById("gastosTotal").innerText="R$ "+gastosTotal.toFixed(2);

let saldo=receitaTotal-gastosTotal;

let saldoEl=document.getElementById("saldo");
saldoEl.innerText="R$ "+saldo.toFixed(2);
saldoEl.className=saldo>=0?"green":"red";
}

atualizar();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financeiro</title>

<style>
body { font-family: Arial; background:#111; color:#fff; margin:0; }
header { text-align:center; padding:15px; background:#222; }
.container { padding:15px; }

.card {
  background:#1e1e1e;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
  cursor:pointer;
}

input, select, button {
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:none;
}

button { background:#00c853; color:#fff; font-weight:bold; }

.green{color:#00e676;}
.red{color:#ff5252;}
.yellow{color:#ffd740;}

.hidden{display:none;}
</style>
</head>

<body>

<header>💰 Meu Financeiro</header>

<div class="container">

<div class="card">
<h3>Saldo</h3>
<p id="saldo">R$ 0</p>
</div>

<div class="card">
<h3>Receita</h3>
<p id="receita">R$ 0</p>
</div>

<div class="card green" onclick="mostrarLista('pago')">
<h3>Pago</h3>
<p>R$ <span id="totalPago">0</span></p>
</div>

<div class="card yellow" onclick="mostrarLista('agendado')">
<h3>Agendado</h3>
<p>R$ <span id="totalAgendado">0</span></p>
</div>

<div class="card red" onclick="mostrarLista('pendente')">
<h3>Pendente</h3>
<p>R$ <span id="totalPendente">0</span></p>
</div>

<div id="lista" class="card hidden"></div>

<!-- BOTÃO NOVA DESPESA -->
<div class="card" onclick="toggleForm()">
<h3>➕ Nova Despesa</h3>
</div>

<!-- FORMULÁRIO ESCONDIDO -->
<div id="formDespesa" class="card hidden">
<h3>Nova Despesa</h3>

<input id="nome" placeholder="Nome">
<input id="valor" type="number" placeholder="Valor total">

<select id="status">
<option value="pendente">Pendente</option>
<option value="agendado">Agendado</option>
<option value="pago">Pago</option>
</select>

<select id="cartao">
<option>Boleto</option>
<option>Visa</option>
<option>Elo</option>
<option>Hipercard</option>
</select>

<select id="responsavel">
<option value="meu">Meu</option>
<option value="outro">Outro</option>
</select>

<input id="pessoa" placeholder="Nome da pessoa (se outro)">
<input id="parcelas" type="number" placeholder="Parcelas">

<button onclick="add()">Salvar</button>
</div>

<div class="card">
<h3>Receita</h3>
<input id="receitaInput" type="number" placeholder="Valor">
<button onclick="salvarReceita()">Adicionar Receita</button>
</div>

</div>

<script>

let despesas = JSON.parse(localStorage.getItem("despesas")) || [];
let receita = Number(localStorage.getItem("receita")) || 0;

function salvar(){
localStorage.setItem("despesas", JSON.stringify(despesas));
localStorage.setItem("receita", receita);
atualizar();
}

function toggleForm(){
let f = document.getElementById("formDespesa");
f.classList.toggle("hidden");
}

function add(){
let nome = document.getElementById("nome").value;
let valor = Number(document.getElementById("valor").value);
let status = document.getElementById("status").value;
let responsavel = document.getElementById("responsavel").value;
let pessoa = document.getElementById("pessoa").value;
let parcelas = Number(document.getElementById("parcelas").value) || 1;

for(let i=1;i<=parcelas;i++){
despesas.push({
nome: nome + " ("+i+"/"+parcelas+")",
valor: valor/parcelas,
status,
responsavel,
pessoa
});
}

salvar();
alert("Despesa salva!");
}

function salvarReceita(){
let valor = Number(document.getElementById("receitaInput").value);
receita += valor; // 🔥 AGORA SOMA
salvar();
alert("Receita adicionada!");
}

function atualizar(){

let pago=0, agendado=0, pendente=0;

despesas.forEach(d=>{
if(d.responsavel!=="meu") return;

if(d.status==="pago") pago+=d.valor;
if(d.status==="agendado") agendado+=d.valor;
if(d.status==="pendente") pendente+=d.valor;
});

document.getElementById("totalPago").innerText=pago.toFixed(2);
document.getElementById("totalAgendado").innerText=agendado.toFixed(2);
document.getElementById("totalPendente").innerText=pendente.toFixed(2);

document.getElementById("receita").innerText="R$ "+receita.toFixed(2);

let saldo=receita-(pago+agendado+pendente);
let saldoEl=document.getElementById("saldo");

saldoEl.innerText="R$ "+saldo.toFixed(2);
saldoEl.className=saldo>=0?"green":"red";

}

function mostrarLista(tipo){
let lista=document.getElementById("lista");
lista.classList.remove("hidden");

let html="<h3>"+tipo.toUpperCase()+"</h3>";

despesas.forEach((d,i)=>{
if(d.status===tipo){
html+=`
<p>${d.nome} - R$ ${d.valor.toFixed(2)}
<button onclick="remover(${i})">X</button>
</p>`;
}
});

lista.innerHTML=html;
}

function remover(i){
despesas.splice(i,1);
salvar();
}

atualizar();

</script>

</body>
</html>
